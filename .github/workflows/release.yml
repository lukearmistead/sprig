name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            arch: x86_64
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install .
          pip install pyinstaller==6.18.0

      - name: Build binary
        run: pyinstaller scripts/sprig.spec

      - name: Smoke test
        timeout-minutes: 1
        run: dist/sprig --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sprig-macos-${{ matrix.arch }}
          path: dist/sprig

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install .
          pip install pyinstaller==6.18.0

      - name: Build binary
        run: pyinstaller scripts/sprig.spec

      - name: Smoke test
        timeout-minutes: 1
        run: dist/sprig.exe --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sprig-windows
          path: dist/sprig.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: sprig-macos-arm64
          path: macos-arm64

      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: sprig-macos-x86_64
          path: macos-x86_64

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: sprig-windows
          path: windows

      - name: Rename assets
        run: |
          mv macos-arm64/sprig macos-arm64/sprig-macos-arm64
          mv macos-x86_64/sprig macos-x86_64/sprig-macos-x86_64
          mv windows/sprig.exe windows/sprig-windows.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            macos-arm64/sprig-macos-arm64
            macos-x86_64/sprig-macos-x86_64
            windows/sprig-windows.exe
