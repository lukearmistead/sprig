name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install .
          pip install pyinstaller==6.18.0

      - name: Build binary
        run: pyinstaller sprig.spec

      - name: Smoke test
        timeout-minutes: 1
        run: dist/sprig --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sprig-macos
          path: dist/sprig

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install .
          pip install pyinstaller==6.18.0

      - name: Build binary
        run: pyinstaller sprig.spec

      - name: Smoke test
        timeout-minutes: 1
        run: dist/sprig.exe --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sprig-windows
          path: dist/sprig.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: sprig-macos
          path: macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: sprig-windows
          path: windows

      - name: Rename assets
        run: |
          mv macos/sprig macos/sprig-macos
          mv windows/sprig.exe windows/sprig-windows.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            macos/sprig-macos
            windows/sprig-windows.exe
